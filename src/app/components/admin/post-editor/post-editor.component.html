<div class="editor-container">
  <h2>{{ isEditMode ? 'Edit Post' : 'New Post' }}</h2>
  <form (ngSubmit)="onSave()">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" [(ngModel)]="title" name="title" required>
    </div>
    <div class="form-group">
      <label for="content">Content</label>
      <textarea id="content" [(ngModel)]="content" name="content" rows="12"></textarea>
    </div>
    <div class="form-group">
      <label for="preview">Preview</label>
      <textarea id="preview" [(ngModel)]="preview" name="preview" rows="4"></textarea>
    </div>
    <div class="form-group">
      <label for="tags">Tags (comma-separated)</label>
      <input type="text" id="tags" [(ngModel)]="tags" name="tags">
    </div>
    <div class="form-actions">
      <button type="submit">{{ isEditMode ? 'Update' : 'Create' }}</button>
      <a routerLink="/admin" class="cancel-link">Cancel</a>
    </div>
  </form>
</div>
