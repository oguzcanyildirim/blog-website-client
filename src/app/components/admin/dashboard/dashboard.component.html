<div class="dashboard-container">
  <div class="dashboard-header">
    <h2>Admin Dashboard</h2>
    <a routerLink="/admin/new-post" class="new-post-btn">New Post</a>
  </div>
  <div class="post-list">
    <div class="post-item" *ngFor="let post of posts">
      <div class="post-info">
        <h3>{{ post.title }}</h3>
        <span class="post-date">{{ post.date | date:'mediumDate' }}</span>
      </div>
      <div class="post-actions">
        <a [routerLink]="'/admin/edit/' + post.id" class="edit-btn">Edit</a>
        <button (click)="deletePost(post.id)" class="delete-btn">Delete</button>
      </div>
    </div>
    <p *ngIf="posts.length === 0" class="no-posts">No posts found.</p>
  </div>
</div>
