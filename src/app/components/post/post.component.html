<div class="wrapper">
    <article *ngIf="postData && postData.content">
        <h1>{{ postData.title }}</h1>
        <p class="date">Published on <time>{{ postData.date | date }}</time> &bull; tagged with <a class="tag" *ngFor="let tag of postData.tags" routerLink="/blog/topics/{{ tag.name }}">#{{ tag.name }}</a></p>
        <img *ngIf="postData.thumbnail" src="{{ postData.thumbnail }}" alt="Some alt text">
        <p>{{ postData.preview }}</p>
        <div [innerHTML]="postData.content"></div>
    </article>
    <div class="post-btns" *ngIf="postData">
        <button (click)="prevPost(allPosts)">Previous</button>
        <button (click)="nextPost(allPosts)">Next</button>
    </div>
    <div class="comments-section" *ngIf="postData && postData.id">
        <h2>Comments</h2>
        <app-comment-form *ngIf="authService.isLoggedIn()" [postId]="postData.id" (commentAdded)="onCommentAdded()"></app-comment-form>
        <p *ngIf="!authService.isLoggedIn()" class="login-prompt">
            <a routerLink="/login">log in</a> to leave a comment
        </p>
        <app-comment-list [postId]="postData.id" #commentList></app-comment-list>
    </div>
</div>
